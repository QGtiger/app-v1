# ============================================================
# app-v1 sandbox nginx 配置（合并到宿主 nginx 的 http 块内）
#
# 新增内容：
#   1. 两个 map 指令（放在 http 块顶层，所有 server 块之前）
#   2. v1-api.lightfish.top server 块（→ 127.0.0.1:3060 app-v1 server）
#   3. oc.lightfish.top server 块（→ 127.0.0.1:55001 opencode serve）
#   4. 修改 catch-all *.lightfish.top 的 proxy_pass 为 $backend（map 驱动）
#
# 现有 api.lightfish.top → 3001 保持不变
# ============================================================

# ====================== 全局配置 ======================
server_tokens off;

# ── map 1: WebSocket Connection 头（所有需要 WS 透传的 server 块共用）──
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── map 2: catch-all 内按 $host 路由到不同后端 ──
# preview-{port}.lightfish.top → 127.0.0.1:{port}（vite 预览）
# 其余 *.lightfish.top          → 127.0.0.1:3000（现有主应用，保持不变）
map $host $sandbox_backend {
    default                        http://127.0.0.1:3000;
    ~^preview-(\d+)\.lightfish\.top$  http://127.0.0.1:$1;
}

# ====================== HTTP 80 → HTTPS 301 ======================
server {
    listen 80;
    server_name lightfish.top *.lightfish.top;
    return 301 https://$host$request_uri;
}

# ====================== v1-api.lightfish.top → app-v1 server (3060) ======================
# 精确匹配，优先级高于 *.lightfish.top 通配符
server {
    listen 443 ssl http2;
    server_name v1-api.lightfish.top;

    ssl_certificate     /etc/nginx/ssl/lightfish.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/lightfish.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/xhtml+xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:3060;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE：init 端点用 streamSSE 推安装/启动日志，需关闭缓冲 + 长超时
        proxy_buffering off;
        proxy_read_timeout 86400s;

        # WebSocket（备用，server 本身不主动用 WS）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# ====================== oc.lightfish.top → opencode serve (55001) ======================
# 精确匹配，优先级高于 *.lightfish.top 通配符
# opencode serve 用 SSE 推事件（event.subscribe / global.event），用 WS 做 PTY
server {
    listen 443 ssl http2;
    server_name oc.lightfish.top;

    ssl_certificate     /etc/nginx/ssl/lightfish.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/lightfish.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/xhtml+xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:55001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE：event.subscribe 是长连接，必须关闭缓冲 + 超时拉长
        proxy_buffering off;
        proxy_read_timeout 86400s;

        # WebSocket：PTY 终端连接需要 upgrade 透传
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# ====================== api.lightfish.top → 现有 API (3001) 【保持不变】 ======================
server {
    listen 443 ssl http2;
    server_name api.lightfish.top;

    ssl_certificate /etc/nginx/ssl/lightfish.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/lightfish.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/xhtml+xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# ====================== 泛域名 catch-all → 3000 或 preview-{port} → {port} ======================
# map $sandbox_backend 驱动：
#   preview-5174.lightfish.top → http://127.0.0.1:5174（vite 预览）
#   其他 *.lightfish.top       → http://127.0.0.1:3000（现有主应用，保持不变）
server {
    listen 443 ssl http2;
    server_name *.lightfish.top lightfish.top;

    ssl_certificate /etc/nginx/ssl/lightfish.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/lightfish.top/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xhtml+xml
        image/svg+xml;

    location / {
        # 变量驱动 proxy_pass：127.0.0.1 是字面 IP，无需 resolver
        proxy_pass $sandbox_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # vite HMR 走 WebSocket，需 upgrade 透传
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # SSE 友好（preview 一般不需要，但加上无害）
        proxy_buffering off;
        proxy_read_timeout 86400s;
    }

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
}
