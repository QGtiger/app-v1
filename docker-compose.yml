services:
  opencode-sandbox:
    container_name: sandbox-host        # server 通过此名 docker exec 进来
    build: ./apps/opencode-sandbox
    ports:
      - "127.0.0.1:55001:4096"               # 对齐 ai-web 的 OPENCODE_BASE_URL，浏览器直连（仅本机）
      - "127.0.0.1:5174-5199:5174-5199"      # 每个 workspace 的 vite 预览端口池（仅本机）
    volumes:
      - workspace:/workspace            # 生成的项目持久化，容器重建不丢
      - opencode-data:/root/.local/share/opencode   # opencode.db 持久化：session/聊天历史，容器重建不丢
    env_file: .env
    restart: always

  server:
    container_name: sandbox-server
    build:
      context: .                        # 需要 pnpm-workspace.yaml + pnpm-lock.yaml
      dockerfile: apps/server/Dockerfile
    ports:
      - "127.0.0.1:3060:3060"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # 控制 sandbox 容器（docker exec）
      - ./data:/app/data
    env_file: .env
    restart: always
    depends_on:
      - opencode-sandbox                # 仅保证启动顺序，就绪由 server 内 waitForContainer 兜底

volumes:
  workspace:
  opencode-data:
